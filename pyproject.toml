[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-coder"
version = "2.0.0"
description = "AI-powered coding assistant CLI — local, offline, powerful"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "langchain-ollama>=0.2.0",
    "langchain-core>=0.3.0",
    "rich>=13.0.0",
    "pyyaml>=6.0",
    "ddgs>=9.0.0",
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
    "packaging>=24.0",
    "pathspec>=0.12.0",
    "chromadb>=0.5.0",
]

[project.scripts]
aicoder = "aicoder_cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["core*", "tools*", "commands*", "aicoder_cli*", "phases*"]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.md"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
